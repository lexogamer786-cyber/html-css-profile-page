<html>
  <head>
    <title>Sofiyan - Practice Page</title>
  </head>

  <body style="background-color:#66FCF1;">

    <!-- h1 = sabse bada heading -->
    <h1 style="font-size: 50px; text-align: center; color: black;">
      Shaik Sofiyan
    </h1>

    <!-- p = paragraph tag -->
    <p style="font-style: italic; color: gray;">
      Hey Welcome, My name is Sofiyan. This is my HTML practice page.
    </p>

    <!--
      img tag = image dikhata hai
      src = image ka NAAM — bilkul same hona chahiye
      alt = image na dikhe tab yeh text dikhega
      width = image ki chaudai pixels mein
      
      IMPORTANT: image file aur HTML file
      SAME FOLDER mein honi chahiye!
    -->
    <img src="workflow.jpg" alt="Workflow Image" width="400">

    <br><br>

    <!--
      a tag = link banata hai
      href = kahan jaana hai click pe
      style = button jaisa dikhane ke liye CSS
    -->
    <a href="https://github.com/lexogamer786-cyber"
       style="
         background-color: black;
         color: #66FCF1;
         padding: 10px;
         text-decoration: none;
         border-radius: 5px;">
      Visit My GitHub
    </a>

  </body>
</html>
